<app-header></app-header>

<ion-content class="ion-padding">

  <ion-grid>
    <ion-row>
      <ion-col size="6" *ngFor="let categoria of categorias">

        <ion-card [routerLink]="['/locales', categoria.id]">
          <img 
            *ngIf="categoria.imagen"
            [src]="categoria.imagen"
            alt="{{ categoria.nombre }}"
          >

          <ion-card-header>
            <ion-card-title>
              {{ categoria.nombre }}
            </ion-card-title>
          </ion-card-header>
        </ion-card>

      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>

<app-footer></app-footer>
