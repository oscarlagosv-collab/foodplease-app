<app-header></app-header>

<ion-content class="ion-padding">

  <ion-grid>
    <ion-row>
      <ion-col size="6" *ngFor="let local of locales">

        <ion-card [routerLink]="['/sucursales', local.id]">

          <img 
            *ngIf="local.imagen"
            [src]="local.imagen"
            alt="{{ local.nombre }}"
          >

          <ion-card-header>
            <ion-card-title>
              {{ local.nombre }}
            </ion-card-title>
          </ion-card-header>

          <ion-card-content>
            <p>{{ local.categoria_nombre }}</p>
            <p>⭐ {{ local.calificacion }} · {{ local.tiempo_entrega }}</p>
          </ion-card-content>

        </ion-card>

      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>

<app-footer></app-footer>
