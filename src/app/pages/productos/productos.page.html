<app-header></app-header>

<ion-content class="ion-padding">

  <ion-grid>
    <ion-row>

      <ion-col size="12" *ngFor="let producto of productos">

        <ion-card>

          <img
            *ngIf="producto.imagen"
            [src]="producto.imagen"
            alt="{{ producto.nombre }}"
          >

          <ion-card-header>
            <ion-card-title>
              {{ producto.nombre }}
            </ion-card-title>
          </ion-card-header>

          <ion-card-content>

            <p>{{ producto.descripcion }}</p>

            <h2>
              ${{ producto.precio }}
            </h2>

            <ion-button expand="block" color="danger" (click)="agregarCarrito(producto)">
              Agregar al carrito
            </ion-button>

          </ion-card-content>

        </ion-card>

      </ion-col>

    </ion-row>
  </ion-grid>

</ion-content>

<app-footer></app-footer>
